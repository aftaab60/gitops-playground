server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ calls to the Go API service inside the cluster.
    # The browser calls /api/v1/... → nginx forwards to api-service:8080/api/v1/...
    location /api/ {
        proxy_pass http://api-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Flutter web — all unmatched routes serve index.html (SPA routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

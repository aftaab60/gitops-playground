apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: gitops-tracker
spec:
  # Auto-promote new Freight to dev and staging automatically.
  # Prod is NOT listed here — it requires a manual promotion trigger.
  promotionPolicies:
    - stage: dev
      autoPromotionEnabled: true
    - stage: staging
      autoPromotionEnabled: true

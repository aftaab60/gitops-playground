apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitops-prod
resources:
- namespace.yaml
- ../base
# Kargo updates newTag here when promoting a new nginx version to prod.
images:
- name: nginx
  newTag: 1.31.2
patches:
- path: app-config-patch.yaml
  target:
    kind: ConfigMap
    name: app-config
- path: api-patch.yaml
  target:
    kind: Deployment
    name: api
- path: frontend-patch.yaml
  target:
    kind: Deployment
    name: frontend
- path: postgres-secret-patch.yaml
  target:
    kind: Secret
    name: postgres-secret

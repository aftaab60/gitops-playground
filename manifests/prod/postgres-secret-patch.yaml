# IMPORTANT: In real production, never commit actual credentials here.
# Use Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets) or
# External Secrets Operator instead. This patch is a placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_WITH_REAL_PROD_SECRET
  POSTGRES_DB: appdb_prod
